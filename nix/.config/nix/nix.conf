# 1. 실험적 기능 활성화 (Flakes 및 최신 커맨드 사용 필수)
experimental-features = nix-command flakes

# 2. 성능 최적화 (M4/Studio 코어 활용)
# max-jobs: 동시 빌드 수. 'auto'는 코어 수에 맞춤.
# cores: 빌드당 사용할 CPU 코어 수. 0은 전체 활용.
max-jobs = auto
cores = 0

# 3. 스토리지 관리 (Mac 용량 확보)
# 빌드 후 중복 파일을 자동으로 하드링크하여 용량 절약
auto-optimise-store = true

# 4. 바이너리 캐시 (속도 개선)
# 베트남 네트워크 환경을 고려하여 공식 캐시와 커뮤니티 캐시 병렬 사용
substituters = https://cache.nixos.org/ https://nix-community.cachix.org
trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs=

# 5. 보안 및 권한
# 신뢰할 수 있는 사용자 지정 (flakes 사용 시 필요)
trusted-users = crong  # 석영님의 계정명으로 변경 필요

# 6. 기타 편의성
# 빌드 로그 유지 및 가비지 컬렉션(GC) 시 누락 방지
keep-outputs = true
keep-derivations = true
