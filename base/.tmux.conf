# =====================================================================
# 1. 기본 서버/세션 설정
# =====================================================================
# 256색상 및 True Color 지원 (M4 Mac/Prompt 3 가독성 향상)
set -g default-terminal "tmux-256color"

# WezTerm 최적화: True Color, Undercurl, OSC 52, Focus event
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",xterm-256color:usstyle"
set -sa terminal-features ",xterm-256color:clipboard"
set -sa terminal-features ",xterm-256color:focus"
set -sa terminal-features ",xterm-256color:hyperlinks"
set -sa terminal-features ",xterm-256color:title"
set -sa terminal-features ",xterm-256color:overline"

# 히스토리 용량 확장 (데브옵스 로그 확인용)
set -g history-limit 50000

# 메시지 표시 시간 (ms)
set -g display-time 2000

# 에스코프 타임 단축 (Vim 사용 시 입력 지연 방지)
set -s escape-time 0

# 집중 이벤트 — nvim autoread, vim FocusGained 동작
set -g focus-events on

# 창 리사이즈 반응성
set -g aggressive-resize on

# WezTerm passthrough 허용 (kitty graphics 등)
set -g allow-passthrough on

# =====================================================================
# 2. 마우스 및 클립보드
# =====================================================================
# 마우스 모드 — tmux가 관리, WezTerm에 패스스루
set -g mouse on

# 클립보드 — OSC 52로 시스템 클립보드 연동
set -s set-clipboard on

# 마우스로 선택 시 복사 (Drag → copy)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# =====================================================================
# 3. 단축키 및 윈도우 관리
# =====================================================================
# Prefix를 Ctrl-a로 변경
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 윈도우/패널 인덱스를 1부터 시작
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# 화면 분할 직관화 (현재 경로 유지)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim 스타일 패널 이동 — nvim 내부면 nvim에 위임, 아니면 tmux 이동
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?n?vim\.?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# =====================================================================
# 4. 시각적 설정 (43인치 4K 모니터 최적화)
# =====================================================================

# 상태 바 기본 설정
set -g status-position bottom
set -g status-style "bg=default,fg=white"
set -g status-interval 5

# 좌측 영역 (Session Information)
set -g status-left-length 40
set -g status-left "#[fg=black,bg=cyan,bold]  #S #[bg=default,fg=cyan] #[default]"

# 우측 영역 (System Metrics & Clock)
set -g status-right-length 100
set -g status-right "#[fg=yellow] #(hostname) #[fg=white]| #[fg=green] #[fg=white]%H:%M #[fg=cyan] #[fg=white]%Y-%m-%d "

# 윈도우 리스트
setw -g window-status-format "#[fg=gray] #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold]#[bg=cyan,fg=black,bold] #I:#W #[bg=default,fg=cyan,bold]"
setw -g window-status-separator ""

# 패널 경계선
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=cyan"

# 메시지 스타일
set -g message-style "bg=yellow,fg=black,bold"
