name: Secret Scan

on:
  push:
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: TruffleHog Scan
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000000" ]; then
              BASE=""
            else
              BASE="${{ github.event.before }}"
            fi
            HEAD="${{ github.event.after }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          fi

          ARGS="--fail --no-update --no-verification --json"

          docker run --rm -v $PWD:/src ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///src/ \
            ${BASE:+--since-commit $BASE} \
            ${HEAD:+--branch $HEAD} \
            $ARGS 2>&1 | tee /tmp/trufflehog-results.json
      - name: Notify Pushover
        if: always()
        run: |
          SECRET_COUNT=$(grep -c '"DetectorType"' /tmp/trufflehog-results.json 2>/dev/null || true)
          SECRET_COUNT=${SECRET_COUNT:-0}
          if [ "$SECRET_COUNT" -eq 0 ]; then
            echo "No secrets detected."
            exit 0
          fi
          # 탐지된 secret별로 Pushover 알림 전송
          grep '"DetectorType"' /tmp/trufflehog-results.json | while IFS= read -r line; do
            DETECTOR=$(echo "$line" | jq -r '.DetectorName // "Unknown"')
            FILE=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.file // "Unknown"')
            LINE_NUM=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.line // "Unknown"')
            RAW=$(echo "$line" | jq -r '.Raw // "Unknown"')
            DESC=$(echo "$line" | jq -r '.DetectorDescription // "Unknown"')
            EMAIL=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.email // "Unknown"')
            COMMIT=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.commit // "Unknown"')
            # Pushover 제목: DetectorName-File:Line (최대 250자)
            TITLE="${DETECTOR}-${FILE}:${LINE_NUM}"
            TITLE="${TITLE:0:250}"
            # Pushover 내용: Raw + DetectorDescription + email + commit (최대 1024자)
            MSG=$(printf "%s\n%s\n%s\n%s" "$RAW" "$DESC" "$EMAIL" "$COMMIT")
            MSG="${MSG:0:1024}"
            curl -s -X POST https://api.pushover.net/1/messages.json \
              --data-urlencode "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
              --data-urlencode "user=${{ secrets.PUSHOVER_USER_KEY }}" \
              --data-urlencode "title=${TITLE}" \
              --data-urlencode "message=${MSG}" \
              --data-urlencode "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --data-urlencode "url_title=View workflow run" \
              -d "priority=1"
          done
          # GitHub Actions 콘솔에 전체 탐지 결과 출력
          echo "::group::🚨 Detected Secrets (${SECRET_COUNT})"
          grep '"DetectorType"' /tmp/trufflehog-results.json | while IFS= read -r line; do
            echo "- $(echo "$line" | jq -r '.DetectorName'): $(echo "$line" | jq -r '.SourceMetadata.Data.Git.file'):$(echo "$line" | jq -r '.SourceMetadata.Data.Git.line') | $(echo "$line" | jq -r '.Raw')"
          done
          echo "::endgroup::"
          exit 1
