name: Secret Scan

on:
  push:
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Scan
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              BASE=""
            else
              BASE="${{ github.event.before }}"
            fi
            HEAD="${{ github.event.after }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          fi

          ARGS="--fail --no-update --no-verification --json"

          docker run --rm -v $PWD:/src ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///src/ \
            ${BASE:+--since-commit $BASE} \
            ${HEAD:+--branch $HEAD} \
            $ARGS 2>&1 | tee /tmp/trufflehog-results.json

      - name: Notify Pushover
        if: always()
        run: |
          SECRET_COUNT=$(grep -c '"DetectorType"' /tmp/trufflehog-results.json 2>/dev/null || echo "0")

          if [ "$SECRET_COUNT" -eq 0 ]; then
            echo "No secrets detected."
            exit 0
          fi

          DETAILS=""
          while IFS= read -r line; do
            DETECTOR=$(echo "$line" | jq -r '.DetectorName // "Unknown"')
            FILE=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.file // "Unknown"')
            LINE_NUM=$(echo "$line" | jq -r '.SourceMetadata.Data.Git.line // "Unknown"')
            RAW=$(echo "$line" | jq -r '.Raw // "Unknown"')
            DETAILS="${DETAILS}
• ${DETECTOR}: ${FILE}:${LINE_NUM} | Secret: ${RAW}"
          done < <(grep '"DetectorType"' /tmp/trufflehog-results.json)

          MSG="TruffleHog detected ${SECRET_COUNT} secret(s) in ${{ github.repository }} on ${{ github.ref_name }}${DETAILS}"

          curl -s -X POST https://api.pushover.net/1/messages.json \
            --data-urlencode "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            --data-urlencode "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            --data-urlencode "title=🚨 Secret detected" \
            --data-urlencode "message=${MSG}" \
            --data-urlencode "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --data-urlencode "url_title=View workflow run" \
            --data-urlencode "priority=1"

          echo "::group::🚨 Detected Secrets"
          echo "$MSG"
          echo "::endgroup::"
          exit 1
