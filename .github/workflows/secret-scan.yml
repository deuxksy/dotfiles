name: Secret Scan

on:
  push:
  pull_request:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Scan
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              BASE=""
            else
              BASE="${{ github.event.before }}"
            fi
            HEAD="${{ github.event.after }}"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          fi

          ARGS="--fail --no-update --no-verification --json"

          docker run --rm -v $PWD:/src ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///src/ \
            ${BASE:+--since-commit $BASE} \
            ${HEAD:+--branch $HEAD} \
            $ARGS
      - name: Notify Pushover
        if: failure()
        run: |
          curl -s -X POST https://api.pushover.net/1/messages.json \
            -d "token=${{ secrets.PUSHOVER_APP_TOKEN }}" \
            -d "user=${{ secrets.PUSHOVER_USER_KEY }}" \
            -d "title=🚨 Secret detected" \
            -d "message=TruffleHog detected secrets in ${{ github.repository }} on ${{ github.ref_name }}" \
            -d "url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -d "url_title=View workflow run" \
            -d "priority=1"
